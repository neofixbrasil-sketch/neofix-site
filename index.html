<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NeoFix Brasil — Conserto + Customização de Eletrônicos</title>
<meta name="description" content="NeoFix Brasil — Assistência técnica multimarcas para qualquer eletrônico. Atendemos via Correios para todo o Brasil. Em pré-lançamento 2025." />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<style>
  /* ============ RESET / BASE ============ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-0: #05050a;
    --bg-1: #0c0c14;
    --bg-2: #14141c;
    --surface: rgba(22, 22, 32, 0.6);
    --border: rgba(255, 255, 255, 0.08);
    --text: #eaeaf2;
    --text-dim: #a7a7b8;
    --pink: #ff1e88;
    --pink-soft: #ff6bc5;
    --blue: #1e7bff;
    --blue-soft: #62a6ff;
    --cyan: #22d3ee;
    --shadow-pink: 0 0 28px rgba(255, 30, 136, 0.55);
    --shadow-blue: 0 0 28px rgba(30, 123, 255, 0.55);
    --coming-soon: #ff6b35;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Rajdhani', system-ui, sans-serif;
    background: var(--bg-0);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Animated background grid */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(30, 123, 255, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 30, 136, 0.06) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: -2;
    pointer-events: none;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(600px circle at 10% 15%, rgba(255, 30, 136, 0.18), transparent 60%),
      radial-gradient(700px circle at 90% 85%, rgba(30, 123, 255, 0.15), transparent 60%);
    z-index: -1;
    pointer-events: none;
  }

  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }
  button, input, select, textarea { font: inherit; color: inherit; }

  .container {
    width: min(1240px, 92%);
    margin-inline: auto;
  }

  /* ============ HEADER ============ */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(5, 5, 10, 0.95);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.5rem;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo .neo { color: var(--pink); text-shadow: var(--shadow-pink); }
  .logo .fix { color: var(--blue); text-shadow: var(--shadow-blue); }
  .logo .br {
    font-size: 0.7rem;
    font-weight: 500;
    padding: 4px 10px;
    border: 1px solid var(--pink);
    border-radius: 999px;
    color: var(--pink);
    letter-spacing: 3px;
  }

  .beta-badge {
    background: var(--coming-soon);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Orbitron', sans-serif;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .nav-links {
    display: flex;
    list-style: none;
    gap: 30px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 500;
    font-size: 0.82rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .nav-links a {
    position: relative;
    padding: 8px 2px;
    color: var(--text-dim);
    transition: color .25s ease;
  }
  .nav-links a:hover { color: var(--blue-soft); }
  .nav-links a::after {
    content: "";
    position: absolute;
    left: 0; bottom: 0;
    width: 0; height: 2px;
    background: linear-gradient(90deg, var(--pink), var(--blue));
    transition: width .3s ease;
  }
  .nav-links a:hover::after { width: 100%; }

  .menu-toggle {
    display: none;
    background: transparent;
    border: none;
    color: var(--blue-soft);
    font-size: 1.5rem;
    cursor: pointer;
  }

  /* ============ BUTTONS ============ */
  .btn-primary {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 18px 32px;
    background: linear-gradient(135deg, var(--pink), #c41270);
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 0 0 1px rgba(255, 30, 136, 0.4), 0 10px 40px rgba(255, 30, 136, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    transition: transform .25s ease, box-shadow .25s ease;
    overflow: hidden;
  }
  .btn-primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: translateX(-100%);
    transition: transform .6s ease;
  }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 0 0 1px var(--pink), 0 16px 50px rgba(255, 30, 136, 0.6); }
  .btn-primary:hover::before { transform: translateX(100%); }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 18px 28px;
    border: 1px solid rgba(30, 123, 255, 0.45);
    color: var(--blue-soft);
    background: rgba(30, 123, 255, 0.06);
    border-radius: 14px;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all .25s ease;
  }
  .btn-secondary:hover {
    border-color: var(--blue);
    color: #fff;
    box-shadow: var(--shadow-blue);
    transform: translateY(-3px);
  }

  .btn-coming-soon {
    background: linear-gradient(135deg, var(--coming-soon), #e55a2b);
    border: none;
    color: #fff;
    pointer-events: none;
    opacity: 0.7;
  }

  /* ============ HERO ============ */
  .hero { position: relative; padding: 90px 0 110px; overflow: hidden; }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 60px;
    align-items: center;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--blue-soft);
    padding: 8px 16px;
    border: 1px solid rgba(30, 123, 255, 0.35);
    border-radius: 999px;
    background: rgba(30, 123, 255, 0.05);
    margin-bottom: 24px;
    text-transform: uppercase;
  }
  .eyebrow .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 12px var(--blue);
    animation: pulse 1.6s infinite;
  }

  .hero h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(2.3rem, 5vw, 4.2rem);
    line-height: 1.05;
    letter-spacing: -1px;
    margin-bottom: 22px;
  }
  .hero h1 .grad {
    background: linear-gradient(120deg, var(--pink) 0%, var(--blue) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 18px rgba(255, 30, 136, 0.3));
  }

  .hero p {
    color: var(--text-dim);
    font-size: 1.15rem;
    max-width: 560px;
    margin-bottom: 36px;
  }

  .btn-group { display: flex; flex-wrap: wrap; gap: 16px; }

  .hero-stats {
    display: flex;
    gap: 40px;
    margin-top: 42px;
    flex-wrap: wrap;
  }
  .hero-stats .stat strong {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    color: #fff;
    display: block;
  }
  .hero-stats .stat span {
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .hero-stats .stat:nth-child(1) strong { color: var(--coming-soon); }
  .hero-stats .stat:nth-child(2) strong { color: var(--blue-soft); }
  .hero-stats .stat:nth-child(3) strong { color: #fff; }

  /* Hero visual */
  .hero-visual {
    position: relative;
    aspect-ratio: 1 / 1;
    max-width: 500px;
    justify-self: end;
  }
  .hero-visual .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px dashed rgba(30, 123, 255, 0.25);
    animation: spin 28s linear infinite;
  }
  .hero-visual .ring.r2 {
    inset: 14%;
    border-color: rgba(255, 30, 136, 0.3);
    border-style: solid;
    animation-duration: 20s;
    animation-direction: reverse;
  }
  .hero-visual .ring.r3 { inset: 30%; border-color: rgba(30, 123, 255, 0.35); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hero-visual .core {
    position: absolute;
    inset: 36%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--pink), #6a0038 70%, transparent);
    box-shadow: 0 0 80px var(--pink), inset 0 0 30px rgba(255,255,255,0.2);
    animation: breathe 3s ease-in-out infinite;
    display: grid;
    place-items: center;
  }
  .hero-visual .core i {
    font-size: 2.5rem;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.8);
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  /* ============ SECTION COMMON ============ */
  .section { padding: 100px 0; position: relative; }

  .section-head { max-width: 720px; margin-bottom: 56px; text-align: center; }
  .section-head .eyebrow { margin-bottom: 18px; }
  .section-head h2 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 800;
    font-size: clamp(1.9rem, 3.6vw, 2.8rem);
    line-height: 1.1;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }
  .section-head h2 .accent-p { color: var(--pink); text-shadow: var(--shadow-pink); }
  .section-head h2 .accent-b { color: var(--blue-soft); text-shadow: var(--shadow-blue); }
  .section-head p { color: var(--text-dim); font-size: 1.05rem; }

  /* ============ COMING SOON CARDS ============ */
  .coming-soon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    margin-top: 60px;
  }

  .coming-card {
    text-align: center;
    padding: 50px 30px;
    border: 2px dashed rgba(255, 107, 53, 0.5);
    border-radius: 24px;
    background: rgba(255, 107, 53, 0.05);
    transition: all .3s ease;
  }
  .coming-card:hover {
    border-style: solid;
    border-color: var(--coming-soon);
    background: rgba(255, 107, 53, 0.1);
    transform: translateY(-5px);
  }

  .coming-card i {
    font-size: 4rem;
    color: var(--coming-soon);
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
  }

  .coming-card h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem;
    margin-bottom: 12px;
    color: var(--text);
  }

  .coming-card p {
    color: var(--text-dim);
    font-size: 1rem;
    margin-bottom: 20px;
  }

  /* ============ SERVICES GRID ============ */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 22px;
  }

  .service-card {
    position: relative;
    background: linear-gradient(145deg, rgba(20, 20, 28, 0.85), rgba(10, 10, 14, 0.95));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px;
    overflow: hidden;
    transition: transform .35s ease, border-color .35s ease, box-shadow .35s ease;
  }
  .service-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--pink), var(--blue), transparent);
    opacity: 0;
    transition: opacity .3s ease;
  }
  .service-card:hover {
    transform: translateY(-6px);
    border-color: rgba(30, 123, 255, 0.35);
    box-shadow: 0 20px 60px rgba(30, 123, 255, 0.15);
  }
  .service-card:hover::before { opacity: 1; }

  .service-icon {
    width: 54px;
    height: 54px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    font-size: 1.4rem;
    margin-bottom: 18px
